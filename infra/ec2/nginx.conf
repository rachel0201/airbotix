# /etc/nginx/sites-available/api.airbotix.ai
# Reverse proxy for platform-backend. Certbot will add the 443 server block
# (and the Let's Encrypt cert paths) on first `certbot --nginx` run.

upstream platform_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Map for WebSocket upgrade
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.airbotix.ai;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # certbot --nginx will rewrite the rest of this block to redirect to 443.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.airbotix.ai;

    # ssl_certificate / ssl_certificate_key — added by certbot
    # ssl_certificate     /etc/letsencrypt/live/api.airbotix.ai/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.airbotix.ai/privkey.pem;

    # Recommended TLS settings (Mozilla intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers (CORS lives in NestJS itself)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 25m;        # kid artifact uploads go via S3 signed URLs, but be generous
    proxy_read_timeout   75s;
    proxy_connect_timeout 5s;
    proxy_send_timeout   75s;

    access_log /var/log/nginx/api.airbotix.ai.access.log;
    error_log  /var/log/nginx/api.airbotix.ai.error.log warn;

    # WebSocket endpoint (Socket.IO) — needs upgrade headers + long timeouts
    location /ws {
        proxy_pass http://platform_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # Everything else
    location / {
        proxy_pass http://platform_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE / streaming LLM responses — no buffering
        proxy_buffering off;
        proxy_cache off;
    }

    # Health check bypass (curl from CloudWatch / uptime monitor)
    location = /health {
        access_log off;
        proxy_pass http://platform_backend/health;
        proxy_set_header Host $host;
    }
}
